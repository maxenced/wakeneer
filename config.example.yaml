server:
  port: 3000
  sessionSecret: "change-me-to-a-random-string"

auth:
  providers:
    # Any OIDC-compliant provider works (Google, Microsoft, Keycloak, Authelia, etc.)
    - name: "google"
      discoveryUrl: "https://accounts.google.com/.well-known/openid-configuration"
      clientId: "your-google-client-id.apps.googleusercontent.com"
      clientSecret: "your-google-client-secret"
      scopes: ["openid", "email", "profile"]
      authorization:
        allowedEmails:
          - "you@example.com"

    # - name: "keycloak"
    #   discoveryUrl: "https://keycloak.example.com/realms/myrealm/.well-known/openid-configuration"
    #   clientId: "wakenerr"
    #   clientSecret: "your-client-secret"
    #   scopes: ["openid", "email", "profile"]
    #   authorization:
    #     # Authorize by claim value instead of (or in addition to) email allowlist
    #     allowedClaim:
    #       name: "groups"
    #       values: ["wakenerr-users"]

  callbackBaseUrl: "http://localhost:3000"

services:
  - name: "Plex"
    host: "192.168.1.10"
    mac: "AA:BB:CC:DD:EE:FF"
    url: "http://192.168.1.10:32400/web"
  - name: "Nextcloud"
    host: "192.168.1.11"
    mac: "11:22:33:44:55:66"
    url: "https://cloud.example.com"

polling:
  intervalSeconds: 30
